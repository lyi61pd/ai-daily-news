<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 技术日报</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%B0%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
    --hover: #1f2630;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); display: flex; height: 100vh;
  }
  #sidebar {
    width: 300px; min-width: 280px; background: var(--panel);
    border-right: 1px solid var(--border); overflow-y: auto; padding: 16px 0;
  }
  #sidebar h1 { font-size: 16px; margin: 0 0 4px 16px; }
  #sidebar .sub { font-size: 12px; color: var(--muted); margin: 0 0 16px 16px; }
  #list { list-style: none; margin: 0; padding: 0; }
  #list li {
    padding: 9px 16px; cursor: pointer; border-left: 3px solid transparent;
    font-size: 14px; display: flex; justify-content: space-between; gap: 8px;
  }
  #list li:hover { background: var(--hover); }
  #list li.active { background: var(--hover); border-left-color: var(--accent); }
  #list li .date { color: var(--text); }
  #list li .size { color: var(--muted); font-size: 12px; white-space: nowrap; }
  #loading, #err { padding: 16px; color: var(--muted); font-size: 13px; }
  #err { color: #f85149; }
  #main { flex: 1; overflow-y: auto; padding: 32px 48px; }
  #main .placeholder { color: var(--muted); margin-top: 40px; text-align: center; }
  #content { max-width: 900px; margin: 0 auto; line-height: 1.7; }
  #content h1 { font-size: 26px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  #content h2 { font-size: 20px; margin-top: 28px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  #content h3 {
    font-size: 16px; margin: 22px 0 0; padding: 10px 14px;
    background: var(--panel); border: 1px solid var(--border);
    border-left: 3px solid var(--accent); border-radius: 8px 8px 0 0;
    line-height: 1.4;
  }
  /* 条目元数据块：来源/时间/链接 与 正文清晰分离 */
  #content .entry-meta {
    margin: 0; padding: 10px 14px; background: #11161d;
    border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 8px 8px; font-size: 13px; color: var(--muted);
    line-height: 1.8; word-break: break-all;
  }
  #content .entry-meta .k { color: var(--muted); }
  #content .entry-meta .v { color: var(--text); }
  #content .entry-meta a { color: var(--accent); text-decoration: none; }
  #content .entry-meta a:hover { text-decoration: underline; }
  #content .entry-body {
    margin: 10px 2px 4px; padding: 0 4px; color: var(--text);
  }
  #content .entry-body p:first-child { margin-top: 0; }
  #content a { color: var(--accent); text-decoration: none; }
  #content a:hover { text-decoration: underline; }
  #content code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  #content pre { background: #161b22; padding: 14px; border-radius: 8px; overflow-x: auto; }
  #content pre code { padding: 0; background: none; }
  #content blockquote { border-left: 3px solid var(--border); margin: 12px 0; padding: 4px 16px; color: var(--muted); }
  #content table { border-collapse: collapse; width: 100%; margin: 16px 0; }
  #content th, #content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  #content th { background: var(--panel); }
  #content img { max-width: 100%; }
  #content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  #back { display: none; }
  @media (max-width: 720px) {
    body { flex-direction: column; }
    #sidebar { width: 100%; min-width: 0; max-height: 40vh; }
  }
</style>
</head>
<body>
  <aside id="sidebar">
    <h1>📰 AI 技术日报</h1>
    <div class="sub">每日自动归档 · GitHub Pages</div>
    <div id="loading">正在加载日报列表…</div>
    <div id="err"></div>
    <ul id="list"></ul>
  </aside>
  <main id="main">
    <div class="placeholder" id="placeholder">从左侧选择一期日报查看</div>
    <article id="content"></article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
  const REPO = "lyi61pd/ai-daily-news";
  const RAW_BASE = `https://raw.githubusercontent.com/${REPO}/main`;

  const $ = (id) => document.getElementById(id);

  async function loadList() {
    try {
      const r = await fetch(`${RAW_BASE}/docs/index.json`);
      if (!r.ok) throw new Error(`index.json ${r.status}`);
      const out = await r.json(); // [{date, path, size}, ...]
      if (!out.length) {
        $("loading").textContent = "暂无日报";
        return;
      }
      $("loading").style.display = "none";
      const ul = $("list");
      out.forEach((item) => {
        const li = document.createElement("li");
        li.innerHTML = `<span class="date">${item.date}</span>` +
          `<span class="size">${(item.size / 1024).toFixed(1)} KB</span>`;
        li.onclick = () => {
          document.querySelectorAll("#list li").forEach((x) => x.classList.remove("active"));
          li.classList.add("active");
          openReport(item);
        };
        ul.appendChild(li);
      });
      ul.firstChild.click();
    } catch (e) {
      $("loading").style.display = "none";
      $("err").textContent = "加载失败：" + e.message + "（可能是网络受限）";
    }
  }

  async function openReport(item) {
    $("placeholder").style.display = "none";
    $("content").innerHTML = "<p style='color:#8b949e'>加载中…</p>";
    try {
      const r = await fetch(`${RAW_BASE}/${item.path}`);
      if (!r.ok) throw new Error(`raw ${r.status}`);
      const md = await r.text();
      $("content").innerHTML = marked.parse(md);
      decorateEntries();
      document.title = `AI 技术日报 · ${item.date}`;
      window.scrollTo(0, 0);
    } catch (e) {
      $("content").innerHTML = `<p style='color:#f85149'>读取失败：${e.message}</p>`;
    }
  }

  // 把每个 h3(条目标题) 后的 "来源: ... | 时间: ... 链接: URL 描述..." 段落
  // 拆成: .entry-meta(来源/时间/链接, 链接可点) + .entry-body(描述正文)
  function decorateEntries() {
    const root = $("content");
    const hs = root.querySelectorAll("h3");
    hs.forEach((h) => {
      let sib = h.nextElementSibling;
      while (sib && sib.tagName !== "H3" && sib.tagName !== "H2" && sib.tagName !== "H1") {
        if (sib.tagName === "P" && /来源[:：]/.test(sib.textContent)) {
          const meta = sib;
          const text = meta.textContent;
          // 抽取链接
          const linkM = text.match(/(https?:\/\/\S+)/);
          const url = linkM ? linkM[1] : "";
          const rest = text.replace(url, "").replace(/\s*链接[:：]\s*$/, "");
          // 拆 来源 / 时间
          let inner = rest
            .replace(/来源[:：]/, "<span class='k'>来源：</span><span class='v'>")
            .replace(/(\|\s*时间[:：])/, "</span> <span class='k'>时间：</span><span class='v'>")
            .replace(/(\|\s*链接[:：])/, "</span> <span class='k'>链接：</span>");
          inner += "</span>";
          if (url) {
            inner += ` <a href="${url}" target="_blank" rel="noopener">${url}</a>`;
          }
          const body = document.createElement("div");
          body.className = "entry-body";
          // 把 metadata 之后的段落(描述)搬进 body
          const metaDiv = document.createElement("div");
          metaDiv.className = "entry-meta";
          metaDiv.innerHTML = inner;
          h.after(metaDiv);
          // 收集后续段落直到下一个标题，作为 body
          let n = metaDiv.nextElementSibling;
          const toMove = [];
          while (n && n.tagName !== "H3" && n.tagName !== "H2" && n.tagName !== "H1") {
            if (n.tagName === "P") toMove.push(n);
            n = n.nextElementSibling;
          }
          toMove.forEach((p) => body.appendChild(p));
          if (body.children.length) metaDiv.after(body);
          else body.remove();
          break;
        }
        sib = sib.nextElementSibling;
      }
    });
  }

  loadList();
  </script>
</body>
</html>
